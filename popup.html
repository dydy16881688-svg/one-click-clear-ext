<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8" />
  <style>
    body {
      width: 300px;
      margin: 0;
      padding: 0;
      font-family: -apple-system, "Microsoft YaHei", sans-serif;
      color: #1a1a1a;
    }
    .tabs { display: flex; border-bottom: 1px solid #eee; }
    .tab {
      flex: 1; text-align: center; padding: 10px 0;
      font-size: 13px; cursor: pointer; color: #666;
    }
    .tab.active { color: #d33; font-weight: 600; box-shadow: inset 0 -2px 0 #d33; }
    .panel { padding: 14px; display: none; }
    .panel.active { display: block; }

    button.primary {
      width: 100%; padding: 12px; margin-top: 6px;
      font-size: 15px; font-weight: 600; color: #fff;
      background: #d33; border: none; border-radius: 8px; cursor: pointer;
    }
    button.primary:hover { background: #b71c1c; }
    .cat-row {
      display: flex; align-items: center; justify-content: space-between;
      gap: 8px; margin-top: 8px;
    }
    .cat-name { font-size: 13px; color: #333; }
    .cat-count { font-size: 11px; color: #999; }
    button.sec {
      padding: 7px 14px; font-size: 13px; color: #d33; background: #fff;
      border: 1px solid #d33; border-radius: 7px; cursor: pointer; white-space: nowrap;
    }
    button.sec:hover { background: #fde8e8; }

    .opt { display: flex; align-items: center; gap: 8px; padding: 5px 0; font-size: 13px; }
    .opt input { width: 16px; height: 16px; }

    /* 验证器 */
    .otp-hint { font-size: 11px; color: #aaa; margin: 2px 0 10px; }
    .otp-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 14px; margin-bottom: 10px; background: #fff;
      border: 1px solid #eee; border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,.07); cursor: pointer;
      transition: box-shadow .15s, transform .05s;
    }
    .otp-item:hover { box-shadow: 0 3px 12px rgba(0,0,0,.13); }
    .otp-item:active { transform: scale(.99); }
    .otp-left { display: flex; flex-direction: column; min-width: 0; }
    .otp-label {
      font-size: 12px; color: #999; margin-bottom: 3px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px;
    }
    .otp-code {
      font-size: 28px; font-weight: 600; letter-spacing: 3px; color: #eb6a56;
      font-variant-numeric: tabular-nums; line-height: 1.1;
    }
    .otp-ring {
      width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .otp-ring-inner {
      width: 22px; height: 22px; border-radius: 50%; background: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; color: #999;
    }

    .hint { font-size: 11px; color: #999; margin-top: 10px; line-height: 1.5; }
    .link { color: #1a73e8; cursor: pointer; text-decoration: underline; font-size: 12px; }
    #status { margin-top: 10px; font-size: 12px; min-height: 16px; text-align: center; }
    .empty { font-size: 12px; color: #999; text-align: center; padding: 12px 0; }
  </style>
</head>
<body>
  <div class="tabs">
    <div class="tab active" data-tab="launch">🚀 启动</div>
    <div class="tab" data-tab="otp">🔐 验证器</div>
    <div class="tab" data-tab="clear">🧹 清理</div>
  </div>

  <!-- 启动 -->
  <div class="panel active" id="panel-launch">
    <button class="primary" id="openAll">🚀 一键打开全部</button>
    <div id="cats"></div>
    <div id="urlCount" class="hint"></div>
    <div style="margin-top:8px"><span class="link" id="toOptions1">⚙ 设置网址 / 帐密</span></div>

    <label class="opt" style="margin-top:14px; border-top:1px solid #eee; padding-top:12px;">
      <input type="checkbox" id="forceFont" />
      强制所有网站用微软正黑体
    </label>
    <div class="hint">开/关会即时套用（可能要刷新已开的分页）。</div>
  </div>

  <!-- 验证器 -->
  <div class="panel" id="panel-otp">
    <div class="otp-hint">点卡片即可复制动态码</div>
    <div id="otpList"></div>
    <div style="margin-top:8px"><span class="link" id="toOptions2">⚙ 管理验证器</span></div>
  </div>

  <!-- 清理 -->
  <div class="panel" id="panel-clear">
    <label class="opt"><input type="checkbox" id="cookies" checked /> 登出所有网站（清 cookie，含 Google）</label>
    <label class="opt"><input type="checkbox" id="history" checked /> 浏览历史</label>
    <label class="opt"><input type="checkbox" id="cache" checked /> 快取 Cache</label>
    <label class="opt"><input type="checkbox" id="downloads" /> 下载记录</label>
    <button class="primary" id="run" style="margin-top:12px">一键执行</button>
    <div id="status"></div>
  </div>

  <script src="totp.js"></script>
  <script src="popup.js"></script>
</body>
</html>
