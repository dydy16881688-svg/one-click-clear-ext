<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8" />
  <style>
    body {
      width: 300px;
      margin: 0;
      padding: 0;
      font-family: -apple-system, "Microsoft YaHei", sans-serif;
      color: #5b5647;
      background: #fffdf4;
    }
    .tabs { display: flex; border-bottom: 1px solid #f0ead3; background: #fffdf4; }
    .tab {
      flex: 1; text-align: center; padding: 11px 0;
      font-size: 13px; cursor: pointer; color: #9a927e;
    }
    .tab.active { color: #4a9bc4; font-weight: 700; box-shadow: inset 0 -2px 0 #7fb9df; }
    .panel { padding: 14px; display: none; }
    .panel.active { display: block; }

    button.primary {
      width: 100%; padding: 12px; margin-top: 6px;
      font-size: 15px; font-weight: 700; color: #fff;
      background: linear-gradient(135deg, #a9d4ee, #7fb9df);
      border: none; border-radius: 12px; cursor: pointer;
      box-shadow: 0 4px 14px rgba(127,185,223,.4);
      transition: filter .15s, transform .05s;
    }
    button.primary:hover { filter: brightness(1.03); }
    button.primary:active { transform: scale(.99); }
    /* 清理的执行键用小鸡黄，跟打开区分开 */
    #run {
      background: linear-gradient(135deg, #ffe08a, #f7cf5e); color: #8a6d17;
      box-shadow: 0 4px 14px rgba(247,207,94,.45);
    }
    .cat-row {
      display: flex; align-items: center; justify-content: space-between;
      gap: 8px; margin-top: 8px;
    }
    .cat-name { font-size: 13px; color: #5b5647; }
    .cat-count { font-size: 11px; color: #b6ac8e; }
    button.sec {
      padding: 7px 14px; font-size: 13px; font-weight: 600; color: #4a9bc4; background: #fff;
      border: 1.5px solid #a9d4ee; border-radius: 999px; cursor: pointer; white-space: nowrap;
    }
    button.sec:hover { background: #eef7fd; }

    .opt { display: flex; align-items: center; gap: 8px; padding: 5px 0; font-size: 13px; }
    .opt input { width: 16px; height: 16px; accent-color: #7fb9df; }

    /* 验证器 */
    .otp-hint { font-size: 11px; color: #b6ac8e; margin: 2px 0 10px; }
    .otp-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 14px; margin-bottom: 10px; background: #fffef8;
      border: 1px solid #f0ead3; border-radius: 14px;
      box-shadow: 0 2px 8px rgba(180,170,120,.13); cursor: pointer;
      transition: box-shadow .15s, transform .05s;
    }
    .otp-item:hover { box-shadow: 0 4px 14px rgba(180,170,120,.22); }
    .otp-item:active { transform: scale(.99); }
    .otp-left { display: flex; flex-direction: column; min-width: 0; }
    .otp-label {
      font-size: 12px; color: #9a927e; margin-bottom: 3px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px;
    }
    /* 数字颜色由 JS 控制（蓝/红），此处不设 color */
    .otp-code {
      font-size: 28px; font-weight: 600; letter-spacing: 3px;
      font-variant-numeric: tabular-nums; line-height: 1.1;
    }
    .otp-ring {
      width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .otp-ring-inner {
      width: 22px; height: 22px; border-radius: 50%; background: #fffef8;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; color: #9a927e;
    }

    .hint { font-size: 11px; color: #b6ac8e; margin-top: 10px; line-height: 1.5; }
    .link { color: #4a9bc4; cursor: pointer; text-decoration: underline; font-size: 12px; }
    #status { margin-top: 10px; font-size: 12px; min-height: 16px; text-align: center; }
    .empty { font-size: 12px; color: #b6ac8e; text-align: center; padding: 12px 0; }
  </style>
</head>
<body>
  <div class="tabs">
    <div class="tab active" data-tab="launch">🚀 启动</div>
    <div class="tab" data-tab="otp">🔐 验证器</div>
    <div class="tab" data-tab="clear">🧹 清理</div>
  </div>

  <!-- 启动 -->
  <div class="panel active" id="panel-launch">
    <button class="primary" id="openAll">🚀 一键打开全部</button>
    <div id="cats"></div>
    <div id="urlCount" class="hint"></div>
    <div style="margin-top:8px"><span class="link" id="toOptions1">⚙ 设置网址 / 帐密</span></div>

    <label class="opt" style="margin-top:14px; border-top:1px solid #f0ead3; padding-top:12px;">
      <input type="checkbox" id="forceFont" />
      强制所有网站用微软正黑体
    </label>
    <div class="hint">开/关会即时套用（可能要刷新已开的分页）。</div>
  </div>

  <!-- 验证器 -->
  <div class="panel" id="panel-otp">
    <div class="otp-hint">点卡片即可复制动态码</div>
    <div id="otpList"></div>
    <div style="margin-top:8px"><span class="link" id="toOptions2">⚙ 管理验证器</span></div>
  </div>

  <!-- 清理 -->
  <div class="panel" id="panel-clear">
    <label class="opt"><input type="checkbox" id="cookies" checked /> 登出所有网站（清 cookie，含 Google）</label>
    <label class="opt"><input type="checkbox" id="history" checked /> 浏览历史</label>
    <label class="opt"><input type="checkbox" id="cache" checked /> 快取 Cache</label>
    <label class="opt"><input type="checkbox" id="downloads" checked /> 下载记录</label>
    <label class="opt" style="border-top:1px solid #f0ead3; margin-top:8px; padding-top:10px;">
      <input type="checkbox" id="wipeProfile" checked />
      彻底清空设定档（连密码/表单/本地存储也清）
    </label>
    <button class="primary" id="run" style="margin-top:12px">一键执行</button>
    <div id="status"></div>
  </div>

  <script src="totp.js"></script>
  <script src="popup.js"></script>
</body>
</html>
